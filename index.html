<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyrics Player</title>
<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#title { text-align:center; padding:20px; font-size:24px; background:#222; }
#lyrics { position:fixed; bottom:0; left:0; width:100%; max-height:40%; overflow-y:auto; background:rgba(0,0,0,0.9); padding:15px 20px; font-size:18px; line-height:1.4; }
#lyrics::-webkit-scrollbar { width:5px; }
#lyrics::-webkit-scrollbar-thumb { background:#555; border-radius:5px; }
</style>
</head>
<body>

<h1 id="title">Loading...</h1>
<div id="lyrics">Fetching lyrics...</div>

<script>
const params = new URLSearchParams(window.location.search);
const songParam = params.get('song');

if (!songParam) {
  document.getElementById('title').innerText = 'Lyrics Not Found';
  document.getElementById('lyrics').innerText = 'Try another song?';
} else {
  document.getElementById('title').innerText = songParam;
  fetch(`https://andrewlyrics.github.io/${songParam}.txt`)
    .then(res => res.text())
    .then(text => {
      document.getElementById('lyrics').innerText = text;
    })
    .catch(err => {
      document.getElementById('lyrics').innerText = 'Lyrics could not be loaded.';
      console.error(err);
    });
}
</script>

</body>
</html>
