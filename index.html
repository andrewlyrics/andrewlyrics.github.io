<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyrics Player</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
}

#lyrics {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%; /* cover everything */
  overflow-y: auto;
  background: rgba(0,0,0,0.95);
  padding: 1px;
  font-size: 18px;
  line-height: 1.5;
  white-space: pre-line;
  box-sizing: border-box;
}

/* Scrollbar for mobile */
#lyrics::-webkit-scrollbar {
  width: 6px;
}
#lyrics::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 3px;
}
</style>
</head>
<body>

<div id="lyrics">
Loading lyrics...
</div>

<script>
const params = new URLSearchParams(window.location.search);
const songParam = params.get('song');

if (!songParam) {
  document.getElementById('lyrics').innerText = 'Lyrics Not Found';
} else {
  fetch(`${songParam}.txt`)
    .then(res => {
      if (!res.ok) throw new Error('File not found');
      return res.text();
    })
    .then(text => {
      document.getElementById('lyrics').innerText = text;
    })
    .catch(err => {
      document.getElementById('lyrics').innerText = 'Lyrics could not be loaded.';
      console.error(err);
    });
}
</script>

</body>
</html>
